version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gov-backend
    restart: always
    env_file: ./backend/.env
    environment:
      NODE_ENV: production
      DATABASE_CLIENT: sqlite
      DATABASE_FILENAME: .tmp/data.db
      JWT_SECRET: ${JWT_SECRET:-aSecretKey}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:-aSecretKey}
      APP_KEYS: ${APP_KEYS:-aSecretKey,anotherSecretKey}
      API_TOKEN_SALT: ${API_TOKEN_SALT:-aSecretKey}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT:-aSecretKey}
    volumes:
      - ./backend/.tmp:/opt/app/.tmp
      - ./backend/public/uploads:/opt/app/public/uploads
    ports:
      - "1337:1337"
    networks:
      - my_cms_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gov-frontend
    restart: always
    environment:
      NODE_ENV: production
      # Internal Docker DNS path to bypass localhost domain issues on server side calls
      STRAPI_URL: http://backend:1337
      # Public URL for browser fetching and image src
      NEXT_PUBLIC_STRAPI_URL: http://${SERVER_IP:-54.224.21.48}:1337
      # Default fallback public hostnames
      NEXT_PUBLIC_DATAGOV_URL: http://${SERVER_IP:-54.224.21.48}:3002
      NEXT_PUBLIC_PDPA_URL: http://${SERVER_IP:-54.224.21.48}:3004
      # Use token from .env.local via env_file, or fallback
      STRAPI_API_TOKEN: 5dc960f1ba3a6554ba334a6e3e218363869ad7c98315410833d95838d2782c7b930a2af945bcfc678aae98a78378119b90be49da03fa93d3089043d6b32dfec9fb9edf46e439c9267cfed316ba44c406b1b36419f913719334d33a80be2623d3e0ae75cb08594cacad5fa39bb310a0b26d2eb5ec6c4cef73202835209899607a
    ports:
      - "3002:3000"
      - "3004:3000"
    depends_on:
      - backend
    networks:
      - my_cms_net

networks:
  my_cms_net:
    driver: bridge
